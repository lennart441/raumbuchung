services:
  db:
    image: postgres:16-alpine
    container_name: raumbuchung-db
    environment:
      POSTGRES_DB: raumbuchung
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raumbuchung"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      network: host
    container_name: raumbuchung-backend
    environment:
      PORT: 3000
      FRONTEND_ORIGIN: http://localhost:8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/raumbuchung
      AUTH_MODE: ${AUTH_MODE:-dev}
      AUTHENTIK_ISSUER: ${AUTHENTIK_ISSUER:-https://auth.example.com/application/o/raumbuchung}
      AUTHENTIK_AUDIENCE: ${AUTHENTIK_AUDIENCE:-raumbuchung}
      AUTHENTIK_USERINFO_URL: ${AUTHENTIK_USERINFO_URL:-https://auth.example.com/application/o/raumbuchung/userinfo/}
      AUTHENTIK_ENABLE_USERINFO_FALLBACK: ${AUTHENTIK_ENABLE_USERINFO_FALLBACK:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_HOST: ${MAIL_HOST:-mail.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_SECURE: ${MAIL_SECURE:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-mailuser@example.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change-me}
      MAIL_FROM: ${MAIL_FROM:-Raumbuchung <noreply@example.com>}
      MAIL_APP_URL: ${MAIL_APP_URL:-http://localhost:8080}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_AUTH_MODE: ${VITE_AUTH_MODE:-oidc}
        VITE_AUTHENTIK_ISSUER: ${VITE_AUTHENTIK_ISSUER:-https://auth.example.com/application/o/raumbuchung}
        VITE_AUTHENTIK_CLIENT_ID: ${VITE_AUTHENTIK_CLIENT_ID:-raumbuchung-frontend}
        VITE_AUTHENTIK_REDIRECT_URI: ${VITE_AUTHENTIK_REDIRECT_URI:-http://localhost:8080}
        VITE_AUTHENTIK_POST_LOGOUT_REDIRECT_URI: ${VITE_AUTHENTIK_POST_LOGOUT_REDIRECT_URI:-http://localhost:8080}
        VITE_AUTHENTIK_SCOPE: ${VITE_AUTHENTIK_SCOPE:-openid profile email phone}
    container_name: raumbuchung-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
